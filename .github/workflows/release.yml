name: Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev

    - name: Fetch Dependencies (Unix)
      if: runner.os != 'Windows'
      run: |
        chmod +x deps.sh
        ./deps.sh
        # Force check if files exist to fail early if script failed
        ls -R external/

    - name: Fetch Dependencies (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        ./deps.sh
        ls -R external/

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ascii-weather-${{ matrix.os }}
        path: |
          build/ascii-weather-tui
          build/Release/ascii-weather-tui.exe