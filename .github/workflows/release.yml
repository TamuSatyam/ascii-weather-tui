name: Build & Release

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install OpenSSL (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libssl-dev

    - name: Setup Dependencies
      shell: bash
      run: |
        mkdir -p external/CLI11/include/CLI
        mkdir -p external/simdjson
        # Download exact files needed for the include paths in your code
        curl -L https://github.com/CLIUtils/CLI11/releases/download/v2.3.2/CLI11.hpp -o external/CLI11/include/CLI/CLI.hpp
        curl -L https://raw.githubusercontent.com/yhirose/cpp-httplib/master/httplib.h -o external/httplib.h
        curl -L https://raw.githubusercontent.com/simdjson/simdjson/master/singleheader/simdjson.h -o external/simdjson/simdjson.h
        curl -L https://raw.githubusercontent.com/simdjson/simdjson/master/singleheader/simdjson.cpp -o external/simdjson/simdjson.cpp

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ascii-weather-${{ matrix.os }}
        path: |
          build/ascii-weather-tui
          build/Release/ascii-weather-tui.exe