name: Cross-Platform Build

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libssl-dev

    - name: Clone Full Packages
      shell: bash
      run: |
        mkdir -p external
        git clone --depth 1 https://github.com/CLIUtils/CLI11.git external/CLI11
        git clone --depth 1 https://github.com/yhirose/cpp-httplib.git external/cpp-httplib
        git clone --depth 1 https://github.com/simdjson/simdjson.git external/simdjson

    - name: Build Project
      run: |
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: weather-${{ matrix.os }}
        path: |
          build/ascii-weather-tui
          build/Release/ascii-weather-tui.exe